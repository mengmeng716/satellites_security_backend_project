version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: satsec-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${DB_NAME:-satellite_security_db}
    command: >-
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --wait_timeout=${MYSQL_WAIT_TIMEOUT_SECONDS:-432000}
      --interactive_timeout=${MYSQL_INTERACTIVE_TIMEOUT_SECONDS:-432000}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-123456}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2-alpine
    container_name: satsec-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: satellite-backend:1.0.0
    container_name: satsec-backend
    restart: unless-stopped
    command: >-
      gunicorn satellites_security_backend.wsgi:application
      --bind 0.0.0.0:8000
      --workers ${GUNICORN_WORKERS:-2}
      --threads ${GUNICORN_THREADS:-4}
      --timeout ${GUNICORN_TIMEOUT:-300}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      CELERY_BROKER_URL: redis://redis:6379/0
      SATSEC_SSE_MAX_SECONDS: ${SATSEC_SSE_MAX_SECONDS:-432000}
      SATSEC_TASK_HEARTBEAT_SECONDS: ${SATSEC_TASK_HEARTBEAT_SECONDS:-30}
      SATSEC_DB_HEARTBEAT_SECONDS: ${SATSEC_DB_HEARTBEAT_SECONDS:-120}
    ports:
      - "${BACKEND_EXPOSE_PORT:-8000}:8000"
    volumes:
      - app_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/security/healthz/', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 10

  celery_worker:
    image: satellite-backend:1.0.0
    container_name: satsec-celery-worker
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      CELERY_BROKER_URL: redis://redis:6379/0
      SATSEC_SSE_MAX_SECONDS: ${SATSEC_SSE_MAX_SECONDS:-432000}
      SATSEC_TASK_HEARTBEAT_SECONDS: ${SATSEC_TASK_HEARTBEAT_SECONDS:-30}
      SATSEC_DB_HEARTBEAT_SECONDS: ${SATSEC_DB_HEARTBEAT_SECONDS:-120}
    command: ["celery", "-A", "satellites_security_backend", "worker", "-l", "info", "--concurrency=1"]
    volumes:
      - app_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "tr '\\0' ' ' </proc/1/cmdline | grep -q 'celery'"]
      interval: 30s
      timeout: 5s
      retries: 5

  frontend:
    image: satellite-frontend:1.0.0
    container_name: satsec-frontend
    environment:
      - API_HOST=backend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  redis_data:
  app_data:

